<div class="container">
  <div class="list-container">
    @for (driver of drivers; track driver.nome) {
      <div class="card"
           (mouseenter)="selectDriver(driver)"
           (mouseleave)="selectedDriver = undefined"
           [style.border-color]="driver.coloreScuderia">

        <h3>{{ driver.nome }}</h3>
        <p>{{ driver.scuderia }}</p>
        <p>#{{ driver.numeroGara }}</p>

      </div>
    }
  </div>

  <div class="detail-container">
    @if (selectedDriver) {   
      <app-driver-detail
        [driver]="selectedDriver">  //passa il driver selezionato come input al componente driver-detail
      </app-driver-detail>
    }
  </div>
</div>
