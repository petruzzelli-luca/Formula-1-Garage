@for (driver of drivers; track driver.nome) {
  <div class="card"
       (click)="selectDriver(driver)"
       [ngStyle]="{'border-color': getColor(driver.scuderia)}">

    <h3>{{ driver.nome }}</h3>
    <p>{{ driver.scuderia }}</p>
    <p>#{{ driver.numeroGara }}</p>

  </div>
}

@if (selectedDriver) {
  <app-driver-detail
    [driver]="selectedDriver">
  </app-driver-detail>
}
