<div class="card"
     *ngFor="let driver of drivers"
     (click)="selectDriver(driver)"
     [ngStyle]="{'border-color': getColor(driver.scuderia)}">

  <h3>{{ driver.nome }}</h3>
  <p>{{ driver.scuderia }}</p>
  <p>#{{ driver.numeroGara }}</p>

</div>

<app-driver-detail
  *ngIf="selectedDriver"
  [driver]="selectedDriver">

</app-driver-detail>
